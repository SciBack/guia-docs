services:

  # ── Infraestructura base ────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-guia_db}
      POSTGRES_USER: ${POSTGRES_USER:-guia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-guia} -d ${POSTGRES_DB:-guia_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── GUIA servicios ────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: python -m guia serve
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - ./src:/app/src:ro

  chainlit:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: chainlit run src/guia/channels/chainlit_app.py --host 0.0.0.0 --port 8001
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - ./src:/app/src:ro

  telegram:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: python -m guia.channels.telegram_bot
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./src:/app/src:ro

  scheduler:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: python -m guia.scheduler
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./src:/app/src:ro

  dashboard:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: streamlit run src/guia/dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - ./src:/app/src:ro

  # ── Sprint 0.4: PDF extraction ────────────────────────────────
  grobid:
    image: lfoppiano/grobid:0.8.1
    ports:
      - "8070:8070"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/api/isalive"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Sprint 0.6: SSO ────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: dev-mem
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ── M1: Search (ADR-029) ─────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.19.2
    environment:
      - cluster.name=guia-search
      - node.name=guia-node-1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-GuiaSearch_2026!}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.2
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped

  # ── M1: Event bus + Job queue (ADR-011 / ADR-013) ────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guia}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-sciback}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_management load_definitions \"/etc/rabbitmq/definitions.json\""
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── M1: Celery workers (ADR-013) ─────────────────────────────
  celery-worker-indexer:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: celery -A guia.worker.celery_app worker -Q indexer -c 4 --loglevel=info --prefetch-multiplier=1
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./src:/app/src:ro

  celery-worker-harvester:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: celery -A guia.worker.celery_app worker -Q harvester -c 2 --loglevel=info --prefetch-multiplier=1
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./src:/app/src:ro

  celery-worker-grobid:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: celery -A guia.worker.celery_app worker -Q grobid -c 1 --loglevel=info --prefetch-multiplier=1 --time-limit=600
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      grobid:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./src:/app/src:ro

  celery-worker-misc:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: celery -A guia.worker.celery_app worker -Q profile,health -c 4 --loglevel=info --prefetch-multiplier=1
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./src:/app/src:ro

  celery-beat:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: celery -A guia.worker.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - celery_beat_data:/var/lib/celery
      - ./src:/app/src:ro
    restart: unless-stopped

  # ── Reverse proxy ─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - chainlit
      - dashboard
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  opensearch_data:
  rabbitmq_data:
  celery_beat_data:
