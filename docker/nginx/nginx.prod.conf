# ── nginx.prod.conf — GUIA Node producción ────────────────────
#
# Sin SSL — pendiente dominio oficial de DTI UPeU.
# Cuando DTI asigne guia.upeu.edu.pe, agregar certbot + bloque 443.
#
# Keycloak externo: keyid.upeu.edu.pe (no proxy aquí)
# ──────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    upstream api {
        server api:8000;
    }
    upstream chainlit {
        server chainlit:8001;
    }
    upstream dashboard {
        server dashboard:8501;
    }

    # Logging JSON para parseo estructurado
    log_format json_combined escape=json
        '{'
        '"time":"$time_iso8601",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"upstream":"$upstream_addr",'
        '"request_time":$request_time,'
        '"remote_addr":"$remote_addr"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # Timeouts para WebSocket (Chainlit + Streamlit)
    proxy_read_timeout    3600s;
    proxy_send_timeout    3600s;
    proxy_connect_timeout 10s;

    # Ocultar versión nginx
    server_tokens off;

    server {
        listen 80;
        server_name _;

        # GUIA REST API
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # OAI-PMH endpoint
        location /oai {
            proxy_pass http://api/oai;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health endpoint (usado por monitoreo)
        location /health {
            proxy_pass http://api/health;
        }

        # Streamlit dashboard (requiere WebSocket)
        location /dashboard/ {
            proxy_pass http://dashboard/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
        }

        # Chainlit chat web (WebSocket para streaming)
        location /chat/ {
            proxy_pass http://chainlit/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
        }

        # Default → Chainlit (interfaz principal)
        location / {
            proxy_pass http://chainlit;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
        }
    }
}
