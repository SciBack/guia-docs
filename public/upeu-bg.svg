<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 800 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#001929"/>
      <stop offset="100%" stop-color="#023052"/>
    </linearGradient>
    <radialGradient id="glow1" cx="35%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#2ea3f2" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#2ea3f2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="72%" cy="78%" r="40%">
      <stop offset="0%" stop-color="#f8a900" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f8a900" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#2ea3f2" opacity="0.22"/>
    </pattern>
    <radialGradient id="dotFade" cx="50%" cy="45%" r="48%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="75%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="mDots">
      <rect width="800" height="900" fill="url(#dotFade)"/>
    </mask>
  </defs>

  <!-- Base background -->
  <rect width="800" height="900" fill="url(#bg)"/>

  <!-- Blue glow top-left -->
  <rect width="800" height="900" fill="url(#glow1)"/>

  <!-- Gold glow bottom-right -->
  <rect width="800" height="900" fill="url(#glow2)"/>

  <!-- Dot grid fading from center -->
  <rect width="800" height="900" fill="url(#dots)" mask="url(#mDots)"/>

  <!-- Concentric rings -->
  <circle cx="400" cy="420" r="120" fill="none" stroke="#2ea3f2" stroke-width="0.8" opacity="0.14"/>
  <circle cx="400" cy="420" r="200" fill="none" stroke="#2ea3f2" stroke-width="0.7" opacity="0.10"/>
  <circle cx="400" cy="420" r="290" fill="none" stroke="#2ea3f2" stroke-width="0.6" opacity="0.07"/>
  <circle cx="400" cy="420" r="390" fill="none" stroke="#2ea3f2" stroke-width="0.5" opacity="0.04"/>

  <!-- Center crosshair -->
  <circle cx="400" cy="420" r="5" fill="#2ea3f2" opacity="0.55"/>
  <circle cx="400" cy="420" r="12" fill="none" stroke="#2ea3f2" stroke-width="1.2" opacity="0.30"/>

  <!-- Top-left corner accent -->
  <line x1="0"   y1="0"   x2="80"  y2="0"   stroke="#2ea3f2" stroke-width="2" opacity="0.35"/>
  <line x1="0"   y1="0"   x2="0"   y2="80"  stroke="#2ea3f2" stroke-width="2" opacity="0.35"/>

  <!-- Bottom-right corner accent (gold) -->
  <line x1="800" y1="900" x2="720" y2="900" stroke="#f8a900" stroke-width="2" opacity="0.22"/>
  <line x1="800" y1="900" x2="800" y2="820" stroke="#f8a900" stroke-width="2" opacity="0.22"/>

  <!-- Horizontal thin accent line -->
  <line x1="0" y1="450" x2="180" y2="450" stroke="#2ea3f2" stroke-width="0.5" opacity="0.20"/>
  <line x1="620" y1="390" x2="800" y2="390" stroke="#2ea3f2" stroke-width="0.5" opacity="0.20"/>
</svg>
